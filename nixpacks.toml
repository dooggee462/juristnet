[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["cd backend && npm install --cache /tmp/npm-cache"]

[phases.build]
cmds = [
  "cd backend && npx prisma generate",
  "cd frontend && npm install --cache /tmp/npm-cache && npm run build"
]

[start]
cmd = "cd backend && npx prisma db push --accept-data-loss && node src/index.js"
